{% set name = "fnc" %}
{% set version = "0.5.3" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/fnc-{{ version }}.tar.gz
  sha256: f2a6429e5669fee1137be3bd69b73b174cca881a08bccaa4ed09a0d86853ac6f

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - python >={{ python_min }}

test:
  imports:
    - fnc
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/dgilland/fnc
  summary: Functional programming in Python with generators and other utilities.
  license: MIT
  license_file: LICENSE.rst

extra:
  recipe-maintainers:
    - kai-tub
